AWSTemplateFormatVersion: '2010-09-09'
Description: DynamoDB table for storing device tokens for ShadowTrace

Resources:
  DeviceTokensTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: DeviceTokens
      AttributeDefinitions:
        - AttributeName: token
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: token
          KeyType: HASH
      ProvisionedThroughput:
        ReadCapacityUnits: 5
        WriteCapacityUnits: 5
      GlobalSecondaryIndexes:
        - IndexName: userId-index
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
          ProvisionedThroughput:
            ReadCapacityUnits: 5
            WriteCapacityUnits: 5

Outputs:
  DeviceTokensTableName:
    Description: Name of the DeviceTokens DynamoDB table
    Value:
      Ref: DeviceTokensTable
