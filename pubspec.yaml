name: shadowtrace
description: "ShadowTrace – Intelligent Monitoring and Smart Assistant System"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  flutter_riverpod: ^2.3.6
  go_router: ^7.0.1
  dio: ^5.3.1
  http: 1.1.0
  flutter_appauth: ^8.0.3
  flutter_dotenv: ^5.0.2
  google_fonts: ^5.0.0
  lottie: ^2.4.0
  location: ^4.4.0
  permission_handler: ^11.3.0
  flutter_map: 6.0.0
  latlong2: 0.9.1
  firebase_core: ^2.11.0
  firebase_messaging: ^14.6.9
  flutter_local_notifications: ^14.0.0
  speech_to_text: ^5.6.0
  flutter_tts: ^4.0.0
  just_audio: ^0.9.34
  torch_light: ^0.3.0
  shake: ^2.0.0
  shared_preferences: ^2.1.1
  flutter_secure_storage: ^9.0.2
  connectivity_plus: ^5.0.2
  web_socket_channel: ^2.4.0
  camera: ^0.10.0+5
  record: ^5.0.2
  path_provider: ^2.0.15
  uuid: ^4.2.0
  encrypt: 5.0.3
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/sounds/
    - assets/images/
    - assets/
